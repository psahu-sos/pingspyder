# ================================
# APPLICATION CONFIGURATION
# ================================
# Spring Boot Application Name
spring.application.name=pingspyder-backend
# ================================
# PYTHON MICROSERVICE CONFIGURATION
# ================================
# Python FastAPI Service Base URL
python.service.url=http://localhost:8000
# ================================
# PDF CONFIGURATION
# ================================
# Static resource path used during PDF generation
pdf.static.path=YOUR_STATIC_PATH
# ================================
# MONGODB CONFIGURATION
# ================================
# MongoDB Atlas Connection URI
spring.data.mongodb.uri=YOUR_LOCAL_DB_URI
# MongoDB Database Name
spring.data.mongodb.database=DB_NAME
# ================================
# JWT SECURITY CONFIGURATION
# ================================
# JWT Secret Key
jwt.secret=YOUR_API_SECRET_KEY
# JWT Expiration Time (24 Hours in Milliseconds)
jwt.expiration=86400000
# ================================
# SPRING WEB CONFIGURATION
# ================================
# Force Spring Boot to use Servlet-based application type
spring.main.web-application-type=servlet
# ================================
# DEFAULT ADMIN SEEDER CONFIGURATION
# ================================
# Default Admin Username
app.admin.username=ADMIN_NAME
# Default Admin Password
app.admin.password=ADMIN_PASSWORD