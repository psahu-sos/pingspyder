# ================================
# APPLICATION CONFIGURATION
# ================================
# Spring Boot Application Name
spring.application.name=pingspyder
# ================================
# PYTHON MICROSERVICE CONFIGURATION
# ================================
# Python FastAPI Service Base URL
python.service.url=http://localhost:8000
# ================================
# PDF CONFIGURATION
# ================================
# Static resource path used during PDF generation
pdf.static.path=file:///D:/SOS%20Infotech/pingspyder-backend/src/main/resources/static/
# ================================
# MONGODB CONFIGURATION
# ================================
# MongoDB Atlas Connection URI
spring.data.mongodb.uri=mongodb://localhost:27017/Deesha
spring.data.mongodb.database=Deesha
# ================================
# JWT SECURITY CONFIGURATION
# ================================
# JWT Secret Key
jwt.secret=YourVerySecretSecureKey123456789
# JWT Expiration Time (24 Hours in Milliseconds)
jwt.expiration=86400000
# ================================
# SPRING WEB CONFIGURATION
# ================================
# Force Spring Boot to use Servlet-based application type
spring.main.web-application-type=servlet
# ================================
# DEFAULT ADMIN SEEDER CONFIGURATION
# ================================
# Default Admin Username
app.admin.username=admin
# Default Admin Password
app.admin.password=adminscope505
# ================================
# CUSTOMIZED SERVER PORT
# ================================
server.port=8081
# ================================
# SERVER URL NAME
# ================================
server.servlet.context-path=/pingspyder